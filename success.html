<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Order Confirmed — SwaadSe.in</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a0e05;
      --ember: #c05e1e;
      --sand: #fdf6ec;
      --cream: #fffcf7;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Plus Jakarta Sans', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sans);
      background: var(--sand);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .success-container {
      background: var(--cream);
      border: 1px solid rgba(192,94,30,.15);
      border-radius: 12px;
      padding: 60px 40px;
      text-align: center;
      max-width: 520px;
      box-shadow: 0 8px 32px rgba(26,14,5,.14);
    }
    .success-icon { font-size: 80px; margin-bottom: 24px; }
    .success-title { font-family: var(--serif); font-size: 2rem; margin-bottom: 12px; }
    .success-subtitle { font-size: 16px; color: #7a5c40; margin-bottom: 32px; line-height: 1.6; }
    .order-details {
      background: var(--sand);
      border: 1px solid rgba(192,94,30,.1);
      border-radius: 8px;
      padding: 20px;
      margin: 32px 0;
      text-align: left;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(192,94,30,.1);
      font-size: 14px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #7a5c40; font-weight: 500; }
    .detail-value { font-weight: 600; color: var(--ink); }
    .success-message {
      background: #f0faf4;
      border-left: 4px solid #16a34a;
      padding: 16px;
      border-radius: 6px;
      margin: 24px 0;
      font-size: 14px;
      color: #2a6644;
      text-align: left;
    }
    .contact-info {
      background: var(--sand);
      border: 1px solid rgba(192,94,30,.1);
      border-radius: 8px;
      padding: 16px;
      margin: 24px 0;
      font-size: 13px;
      text-align: left;
      line-height: 1.8;
    }
    .success-actions { display: flex; gap: 12px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
    }
    .btn-primary { background: var(--ember); color: #fff; }
    .btn-secondary { background: transparent; color: var(--ember); border: 2px solid var(--ember); }
  </style>
</head>
<body>
<div class="success-container">
  <div class="success-icon" aria-hidden="true">✓</div>
  <h1 class="success-title">Order received</h1>
  <p class="success-subtitle">Thank you! We're preparing your meal with care.</p>

  <div class="order-details">
    <div class="detail-row">
      <span class="detail-label">Order ID</span>
      <span class="detail-value" id="order-id">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Payment status</span>
      <span class="detail-value" id="payment-status">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Estimated delivery</span>
      <span class="detail-value" id="delivery-time">—</span>
    </div>
  </div>

  <div class="success-message">
    We'll contact you with updates. Keep your phone handy.
  </div>

  <div class="contact-info">
    <strong>Need help?</strong><br>
    <span id="contact-help">📍 Kitchen: DD Nagar, Gwalior, MP 474001</span>
  </div>

  <div class="success-actions">
    <a href="index.html" class="btn btn-primary">Back to menu</a>
    <button type="button" class="btn btn-secondary" id="copy-order-btn">Copy order ID</button>
  </div>
</div>

<script src="config/env.js"></script>
<script type="module" src="js/success-page.js"></script>
<script>
  document.getElementById('copy-order-btn')?.addEventListener('click', () => {
    const id = document.getElementById('order-id')?.textContent;
    if (id) navigator.clipboard.writeText(id).then(() => alert('Order ID copied'));
  });
</script>
</body>
</html>
